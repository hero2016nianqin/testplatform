{% extends "base.html" %}
{% block title %}测试执行{% endblock %}
{% block content %}
<div class="row" id="station-view">
    <!-- 左栏：线体列表 -->
    {% if view != 'equipment' %}
    <div class="col-md-12 mb-3" id="lines-panel">
        <div class="card">
            <div class="card-header py-2 d-flex justify-content-between align-items-center">
                <span><i class="bi bi-pin-angle"></i> <strong>线体</strong></span>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-primary active" id="lines-mine-btn" onclick="switchLinesView('mine')">我的线体</button>
                    <button class="btn btn-outline-primary" id="lines-all-btn" onclick="switchLinesView('all')">全部线体</button>
                </div>
            </div>
            <div class="card-body p-0" id="lines-list" style="max-height:calc(100vh - 160px);overflow-y:auto;">
                <p class="text-muted text-center small py-3">加载中...</p>
            </div>
        </div>
    </div>
    {% endif %}
    <!-- 右栏：装备列表 -->
    {% if view != 'lines' %}
    <div class="col-md-12 mb-3" id="equipments-panel">
        <div class="card">
            <div class="card-header py-2 d-flex justify-content-between align-items-center">
                <span><i class="bi bi-hdd-stack"></i> <strong>装备</strong></span>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-primary active" id="equip-mine-btn" onclick="switchEquipView('mine')">我的装备</button>
                    <button class="btn btn-outline-primary" id="equip-all-btn" onclick="switchEquipView('all')">全部装备</button>
                </div>
            </div>
            <div class="card-body p-0" id="equipment-list" style="max-height:calc(100vh - 160px);overflow-y:auto;">
                <p class="text-muted text-center small py-3">加载中...</p>
            </div>
        </div>
    </div>
    {% endif %}
</div>

<!-- 装备编辑 Modal -->
<div class="modal fade" id="equipEditModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑装备</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-equip-id">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">装备名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="edit-equip-name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">所属线体</label>
                        <select class="form-select" id="edit-equip-line"></select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">工序</label>
                        <select class="form-select" id="edit-equip-process">
                            <option value="">-- 选择 --</option>
                            <option value="FT">FT（终测）</option>
                            <option value="老化">老化（Burn In）</option>
                            <option value="ORT">ORT（可靠性）</option>
                            <option value="SMT">SMT（贴片）</option>
                            <option value="Assembly">Assembly（组装）</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">工位</label>
                        <select class="form-select" id="edit-equip-workstation">
                            <option value="">-- 选择 --</option>
                            <option value="MP1">MP1</option>
                            <option value="MP2">MP2</option>
                            <option value="MP3">MP3</option>
                            <option value="MP4">MP4</option>
                            <option value="MP5">MP5</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">执行器</label>
                        <input type="text" class="form-control" id="edit-equip-actuator">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">硬件编码</label>
                        <input type="text" class="form-control" id="edit-equip-hw">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">软件编码</label>
                        <input type="text" class="form-control" id="edit-equip-sw">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="save-edit-equip-btn">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 扫码测试 Modal -->
<div class="modal fade" id="barcodeModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header py-2">
                <h6 class="modal-title"><i class="bi bi-upc-scan"></i> 扫码测试</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-3">
                <input type="hidden" id="barcode-slot-id">
                <input type="hidden" id="barcode-station-id">
                <input type="text" class="form-control form-control-lg text-center" id="barcode-input-modal"
                       placeholder="扫描或输入条码..." autofocus autocomplete="off">
                <div class="mt-2">
                    <button type="button" class="btn btn-primary w-100" onclick="submitBarcodeTest()">
                        <i class="bi bi-play-fill"></i> 开始测试
                    </button>
                </div>
                <div id="barcode-test-progress" class="mt-2 d-none">
                    <div class="progress" style="height:6px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" id="barcode-progress-bar" style="width:0%"></div>
                    </div>
                    <small class="text-muted mt-1 d-block text-center" id="barcode-progress-text">测试进行中...</small>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 右键菜单 -->
<div id="context-menu" class="context-menu d-none">
    <div class="context-menu-header" id="ctx-title">操作</div>
    <div class="context-menu-items" id="ctx-items"></div>
</div>

<!-- 实时日志面板（底部固定，全宽） -->
<div class="log-panel d-none" id="log-panel">
    <div class="log-panel-resize-handle" id="log-resize-handle"></div>
    <div class="log-panel-body">
        <div class="log-panel-sidebar" id="log-filter-bar">
            <button class="log-filter-btn active" data-level="all" onclick="filterLogs('all')" title="全部"><span class="dot dot-all"></span> 全部</button>
            <button class="log-filter-btn" data-level="debug" onclick="filterLogs('debug')" title="调试"><span class="dot dot-debug"></span> 调试</button>
            <button class="log-filter-btn" data-level="info" onclick="filterLogs('info')" title="提示"><span class="dot dot-info"></span> 提示</button>
            <button class="log-filter-btn" data-level="warn" onclick="filterLogs('warn')" title="告警"><span class="dot dot-warn"></span> 告警</button>
            <button class="log-filter-btn" data-level="error" onclick="filterLogs('error')" title="错误"><span class="dot dot-error"></span> 错误</button>
            <button class="log-filter-btn" data-level="fatal" onclick="filterLogs('fatal')" title="致命"><span class="dot dot-fatal"></span> 致命</button>
        </div>
        <div class="log-panel-content">
            <div class="log-panel-toolbar">
                <span><i class="bi bi-terminal"></i> <strong style="color:#fff;">运行日志</strong></span>
                <div style="display:flex;gap:6px;">
                    <button onclick="clearLogs()"><i class="bi bi-trash"></i> 清空</button>
                    <button onclick="exportLogs()"><i class="bi bi-download"></i> 导出</button>
                    <button onclick="toggleLogPanel()"><i class="bi bi-eye-slash"></i> 隐藏</button>
                </div>
            </div>
            <div class="log-panel-entries" id="log-body"></div>
        </div>
    </div>
</div>
<button class="log-hidden-toggle d-none" id="log-show-btn" onclick="toggleLogPanel()" title="显示运行日志">
    <i class="bi bi-terminal"></i> 日志
</button>

{% endblock %}

<script>
let socket = null;
let currentRunId = null, currentBatchId = null;
let currentItemIndex = 0, testItems = [];
let currentStationId = null, currentSlotId = null;
let currentLinesScope = 'all';
let currentEquipScope = 'all';

document.addEventListener('DOMContentLoaded', function() {
    setupSocket();
    var view = '{{ view }}';
    if (view === 'lines') {
        loadLinesList('all');
    } else if (view === 'equipment') {
        loadEquipmentsList('all');
        // 如果 URL 有 line_id 参数，加载该线体的装备
        var p = new URLSearchParams(window.location.search);
        var li = p.get('line_id');
        if (li) fetch('/api/stations?line_id=' + li).then(r=>r.json()).then(r=>renderEquipmentTable(r.data||[]));
    } else {
        loadLinesList('all');
    }

    document.addEventListener('click', function() {
        document.getElementById('context-menu').classList.add('d-none');
    });
    document.addEventListener('contextmenu', function() {
        document.getElementById('context-menu').classList.add('d-none');
    });

    // 检查 URL 参数
    const params = new URLSearchParams(window.location.search);
    const eqId = params.get('equipment_id');
    if (eqId) {
        setTimeout(() => selectEquipment(parseInt(eqId)), 500);
    }


});

function setupSocket() {
    socket = io();
    socket.on('run_started', function(d) { addLogEntry('info', '测试开始：批次 ' + (d.batch_id||'-')); });
    socket.on('item_tested', function(d) {
        const level = d.passed ? 'info' : 'error';
        const icon = d.passed ? '✓' : '✗';
        const detail = d.passed ? d.actual_value : d.actual_value + ' (期望: ' + d.expected_value + ')';
        addLogEntry(level, icon + ' ' + (d.item_name||'') + ': ' + detail);
    });
    socket.on('run_completed', function(d) {
        addLogEntry('info', '测试完成：通过 ' + (d.passed_items||0) + '/' + (d.total_items||0));
    });
    socket.on('run_failed', function(d) {
        addLogEntry('fatal', '测试失败：' + (d.error||'未知错误'));
    });
}

// ==================== 线体列表（我的/全部） ====================

function switchLinesView(scope) {
    currentLinesScope = scope;
    document.querySelectorAll('#lines-panel .btn-group .btn').forEach(b => b.classList.remove('active'));
    document.getElementById('lines-' + scope + '-btn').classList.add('active');
    loadLinesList(scope);
}

function loadLinesList(scope) {
    fetch('/api/stations/lines?scope=' + scope)
        .then(r => r.json())
        .then(res => {
            const div = document.getElementById('lines-list');
            var list = res.data || [];
            if (!list.length) {
                div.innerHTML = '<p class="text-muted text-center small py-3">暂无线体</p>';
                return;
            }
            div.innerHTML = `<table class="table table-hover mb-0"><thead><tr>
                <th>线体名称</th><th>厂区</th><th>创建人</th></tr></thead><tbody>`
                + list.map(l => `<tr style="cursor:pointer" onclick="loadEquipmentsForLine(${l.id})">
                    <td><strong>${l.name}</strong>${l.code ? `<br><small class="text-muted">${l.code}</small>` : ''}</td>
                    <td>${l.factory_name}</td>
                    <td>${l.created_by || '-'}</td>
                </tr>`).join('')
                + `</tbody></table>`;
        });
}

function loadEquipmentsForLine(lineId) {
    // 如果在 lines 页面，跳转到 equipment 页面并带上 line_id 参数
    if (window.location.pathname === '/lines') {
        window.location.href = '/equipment?line_id=' + lineId;
        return;
    }
    // 高亮选中行
    document.querySelectorAll('#lines-list tbody tr').forEach(el => el.classList.remove('table-active'));
    if (event && event.currentTarget) event.currentTarget.classList.add('table-active');
    // 加载该线体的装备
    fetch('/api/stations?line_id=' + lineId)
        .then(r => r.json())
        .then(res => renderEquipmentTable(res.data || []));
}

// ==================== 装备列表（我的/全部） ====================

function switchEquipView(scope) {
    currentEquipScope = scope;
    document.querySelectorAll('#equipments-panel .btn-group .btn').forEach(b => b.classList.remove('active'));
    document.getElementById('equip-' + scope + '-btn').classList.add('active');
    loadEquipmentsList(scope);
}

function editEquipment(id) {
    // 加载装备详情
    fetch('/api/stations/' + id).then(r=>r.json()).then(res => {
        if (res.code !== 0) return;
        const s = res.data;
        document.getElementById('edit-equip-id').value = s.id;
        document.getElementById('edit-equip-name').value = s.name;
        document.getElementById('edit-equip-process').value = s.process_type || '';
        document.getElementById('edit-equip-workstation').value = s.workstation || '';
        document.getElementById('edit-equip-actuator').value = s.actuator || '';
        document.getElementById('edit-equip-hw').value = s.hardware_code || '';
        document.getElementById('edit-equip-sw').value = s.software_code || '';
        // 加载线体列表
        fetch('/api/stations/hierarchy').then(r=>r.json()).then(hRes => {
            const lines = [];
            (hRes.data||[]).forEach(f => (f.lines||[]).forEach(l => lines.push({id:l.id,name:l.name,factory:f.name})));
            const opts = lines.map(l => `<option value="${l.id}">${l.name} (${l.factory})</option>`).join('');
            document.getElementById('edit-equip-line').innerHTML = '<option value="">-- 请选择 --</option>' + opts;
            document.getElementById('edit-equip-line').value = s.line_id || '';
        });
        new bootstrap.Modal(document.getElementById('equipEditModal')).show();
    });
}

document.getElementById('save-edit-equip-btn').addEventListener('click', function() {
    const id = document.getElementById('edit-equip-id').value;
    const data = {
        name: document.getElementById('edit-equip-name').value.trim(),
        line_id: parseInt(document.getElementById('edit-equip-line').value) || null,
        process_type: document.getElementById('edit-equip-process').value,
        workstation: document.getElementById('edit-equip-workstation').value,
        actuator: document.getElementById('edit-equip-actuator').value.trim(),
        hardware_code: document.getElementById('edit-equip-hw').value.trim(),
        software_code: document.getElementById('edit-equip-sw').value.trim(),
    };
    fetch('/api/stations/' + id, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
    }).then(r=>r.json()).then(res => {
        if (res.code === 0) {
            bootstrap.Modal.getInstance(document.getElementById('equipEditModal')).hide();
            loadEquipmentsList(currentEquipScope);
        } else {
            alert(res.message);
        }
    });
});

function loadEquipmentsList(scope) {

        .then(r => r.json())
        .then(res => {
            var list = res.data || [];
            renderEquipmentTable(list);

            <td>${s.actuator || '-'}</td>
            <td>${s.hardware_code || '-'}</td>

                    <button class="btn btn-outline-primary" onclick="editEquipment(${s.id})" title="编辑"><i class="bi bi-pencil"></i></button>

}

function unbindEquipment(id) {
    if (!confirm('确定解除该装备的绑定？')) return;
    fetch(`/api/stations/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({line_id: null, definition_id: null}),
    }).then(r => r.json()).then(res => {
        if (res.code === 0) { loadEquipmentsList(currentEquipScope); loadLinesList(currentLinesScope); }
    });
}

function deleteEquip(id) {
    if (!confirm('确定删除该装备？')) return;
    fetch(`/api/stations/${id}`, {method: 'DELETE'})
        .then(r => r.json()).then(res => {
            if (res.code === 0) { loadEquipmentsList(currentEquipScope); loadLinesList(currentLinesScope); }
        });
}

// ==================== 装备视图（机框+槽位） ====================

function selectEquipment(stationId) {
    currentStationId = stationId;
    addLogEntry('info', '进入装备测试视图 - stationId: ' + stationId);
    fetch(`/api/stations/${stationId}/detail`)
        .then(r => r.json())
        .then(res => {
            if (res.code !== 0) return;
            document.getElementById('station-view').innerHTML = renderEquipmentDetail(res.data);
            document.title = '测试执行 - ' + (res.data.station.name || '');
            showLogPanel(true);
            // 锁定厂区选择器为当前装备所属厂区
            const st = res.data.station;
            if (st.factory_name && typeof setFactoryLocked === 'function') {
                setFactoryLocked(st.factory_name);
            }
            // 打印装备参数到日志
            fetch(`/api/stations/${stationId}/equipment`).then(r=>r.json()).then(cfg=>{
                if (cfg.code !== 0 || !cfg.data) return;
                const d = cfg.data;
                let modes = [];
                if (d.test_mode_normal) modes.push('正常测试');
                if (d.test_mode_verify) modes.push('验证测试');
                if (d.test_mode_calibration) modes.push('校准测试');
                addLogEntry('info', `装备 IP: ${d.equipment_ip || '-'}`);
                addLogEntry('info', `测试模式: ${modes.join(', ') || '无'}`);
                addLogEntry('info', `条码校验: ${d.barcode_verify_enabled ? '开启' : '关闭'}`);
                addLogEntry('info', `自动上板: ${d.auto_load_enabled ? '开启' : '关闭'}`);
                addLogEntry('info', `调试模式: ${d.debug_mode_enabled ? '开启' : '关闭'}`);
                addLogEntry('info', `工序管控: ${d.process_control_enabled ? '开启' : '关闭'}`);
            });
        });
}

function renderEquipmentDetail(detail) {
    if (!detail || !detail.cabinets || detail.cabinets.length === 0) {
        return `<p class="text-muted text-center">该装备暂无机柜</p>`;
    }
    const st = detail.station;
    const stationId = st.id;
    let html = '';
    const isSingleCab = detail.cabinets.length === 1 && detail.cabinets[0].chassis.length === 1;
    // 测试工站（最外层）
    html += `<div class="station-rect${isSingleCab ? ' single-cab' : ''}" oncontextmenu="showStationMenu(event,${stationId})" title="右键：系统初始化 / 测试日志 / 切换账号 / 强制重启">
        <div class="station-header">
            <strong class="station-name"><i class="bi bi-cpu"></i> ${st.name}</strong>
            <div class="station-badges">
                <span class="badge bg-secondary" onclick="event.stopPropagation();showStationParams(${stationId})" title="参数设置"><i class="bi bi-gear"></i> 参数设置</span>
            </div>
        </div>`;
        // 机柜（第二层）
    detail.cabinets.forEach(cab => {
        html += `<div class="cabinet-rect" oncontextmenu="showCabinetMenu(event,${cab.id},'${cab.name}',${stationId})" title="右键：系统初始化 / 测试日志 / 切换账号 / 强制重启">
            <div class="cabinet-header">
                <strong><i class="bi bi-layers"></i> ${cab.name}</strong>
            </div>
            <div class="cabinet-body">`;
        // 机框（第三层）
        (cab.chassis || []).forEach(ch => {
            html += `<div class="chassis-rect" oncontextmenu="showChassisMenu(event,${ch.id},'${ch.name}',${stationId})" title="右键：系统初始化 / 测试日志 / 切换账号 / 强制重启">
                <div class="chassis-header">
                    <strong><i class="bi bi-server"></i> ${ch.name}</strong>
                    <small class="text-muted">${ch.slot_count_actual} 槽位</small>
                </div>
                <div class="chassis-slots">`;
            (ch.slots || []).forEach(s => {
                const fillColor = s.status === 'fail' ? '#f1aeb5' : (s.status === 'pass' ? '#a3cfbb' : '#9eeaf9');
                const isDisabled = s.status === 'disabled';
                const dblclick = isDisabled ? '' : `ondblclick="openBarcodeModal(${s.id},${stationId})"`;
                html += `<div class="slot-item slot-${s.status}" id="slot-${s.id}" ${dblclick} oncontextmenu="showSlotMenu(event,${s.id},${ch.id},'${s.name}','${s.status}',${stationId})" title="${s.name}">
                    <div class="slot-progress-fill" id="slot-fill-${s.id}" style="height:${s.status==='pass'||s.status==='fail'?'100':'0'}%;background:${fillColor}"></div>
                    <div class="slot-content text-center">
                        <div>${s.name.replace('槽位 ','S')}</div>
                        <div style="font-size:.65rem">${statusLabel(s.status)}</div>
                    </div>
                </div>`;
            });
            html += `</div></div>`;
        });
        html += `</div></div>`;
    });
    html += `</div>`;
    return `<div class="detail-container">${html}</div>`;
}

// ==================== 右键菜单 ====================

function showContextMenu(event, title, items) {
    event.preventDefault();
    event.stopPropagation();
    const menu = document.getElementById('context-menu');
    document.getElementById('ctx-title').textContent = title;
    const container = document.getElementById('ctx-items');
    container.innerHTML = items.map(item => {
        if (item.divider) return '<div class="context-menu-divider"></div>';
        if (item.disabled) return '<div class="context-menu-item disabled-label" style="cursor:default;opacity:.55;font-style:italic;font-size:.8rem;padding:3px 14px">' + item.label + '</div>';
        const cls = item.danger ? ' context-menu-item danger' : ' context-menu-item';
        return `<div class="${cls}" onclick="event.stopPropagation();${item.action}">${item.icon||''} ${item.label}</div>`;
    }).join('');
    // 定位菜单
    let x = event.clientX, y = event.clientY;
    const mw = 200, mh = container.children.length * 36 + 40;
    if (x + mw > window.innerWidth) x = window.innerWidth - mw - 10;
    if (y + mh > window.innerHeight) y = window.innerHeight - mh - 10;
    menu.style.left = x + 'px'; menu.style.top = y + 'px';
    menu.classList.remove('d-none');
}

function quickAddEquipment(event, lineName, lineId) {
    fetch('/api/stations/definitions').then(r=>r.json()).then(defRes => {
        let defId = null;
        if (defRes.data && defRes.data.length > 0) {
            let dpStr = '选择装备定义（或取消以手动输入）：\n';
            defRes.data.forEach((d, i) => { dpStr += `${i+1}. ${d.name} (v${d.current_version})\n`; });
            const defIdx = parseInt(prompt(dpStr + '为线体 "' + lineName + '" 新增装备\n请输入编号（或取消以手动输入）：')) - 1;
            if (!isNaN(defIdx) && defIdx >= 0 && defIdx < defRes.data.length) {
                defId = defRes.data[defIdx].id;
            }
        }
        let name = '';
        if (defId) {
            const def = defRes.data.find(d => d.id === defId);
            name = prompt('装备名称（默认使用定义名称）：', def ? def.name : '') || (def ? def.name : '');
        } else {
            name = prompt(`为线体 "${lineName}" 新增装备，请输入装备名称：`);
        }
        if (!name) return;
        fetch('/api/stations', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, line_id: lineId, definition_id: defId, description: ''}),
        }).then(r => r.json()).then(res => {
            if (res.code === 0) { loadLinesList(currentLinesScope); loadEquipmentsList(currentEquipScope); }
            else { alert(res.message); }
        });
    });
}

function openBarcodeModal(slotId, stationId) {
    addLogEntry('info', '打开扫码弹窗 - 槽位: ' + slotId);
    document.getElementById('barcode-slot-id').value = slotId;
    document.getElementById('barcode-station-id').value = stationId;
    document.getElementById('barcode-input-modal').value = '';
    document.getElementById('barcode-test-progress').classList.add('d-none');
    document.getElementById('barcode-progress-bar').style.width = '0%';
    document.getElementById('barcode-progress-text').textContent = '测试进行中...';
    const modal = new bootstrap.Modal(document.getElementById('barcodeModal'));
    modal.show();
    setTimeout(() => document.getElementById('barcode-input-modal').focus(), 300);
}

// 回车键提交扫码
document.getElementById('barcode-input-modal').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitBarcodeTest();
});

function submitBarcodeTest() {
    const slotId = document.getElementById('barcode-slot-id').value;
    const stationId = document.getElementById('barcode-station-id').value;
    const barcode = document.getElementById('barcode-input-modal').value.trim();
    if (!barcode) { alert('请输入条码'); return; }
    addLogEntry('info', `扫码测试启动 - 条码: ${barcode}, 槽位: ${slotId}`);
    document.getElementById('barcode-test-progress').classList.remove('d-none');
    document.getElementById('barcode-progress-text').textContent = '启动中...';
    // 先获取该装备的软件配置（获取已选测试项），再获取测试项列表
    fetch(`/api/stations/${stationId}/software`).then(r=>r.json()).then(softRes => {
        const softwareConfig = (softRes.code === 0 && softRes.data) ? softRes.data : null;
        const selectedIds = softwareConfig ? (softwareConfig.selected_test_item_ids || []) : [];
        const sequenceId = softwareConfig ? (softwareConfig.sequence_id || 0) : 0;
        const sequenceData = softwareConfig ? (softwareConfig.sequence_data || '') : '';
        addLogEntry('info', `装备软件配置: ${selectedIds.length} 个已选测试项, sequence_id=${sequenceId}`);
        // Check for archived sequence snapshot first
        let parsedSeqSteps = [];
        if (sequenceData) {
            try { parsedSeqSteps = JSON.parse(sequenceData); } catch(e) {}
            if (parsedSeqSteps.length) {
                addLogEntry('info', `使用版本归档序列快照: ${parsedSeqSteps.length} 步`);
                startRunWithSteps(parsedSeqSteps, sequenceId, barcode, slotId, stationId);
                return;
            }
        }
        const loadItems = sequenceId
            ? fetch(`/api/tests/sequences/${sequenceId}`).then(r => r.json())
            : fetch('/api/tests/items?active_only=true').then(r => r.json());
        loadItems.then(itemRes => {
            let items = [];
            let steps = [];
            if (sequenceId && itemRes.code === 0 && itemRes.data && itemRes.data.steps) {
                steps = itemRes.data.steps || [];
                addLogEntry('info', `使用测试序列: ${itemRes.data.name}, ${steps.length} 步`);
                if (!steps.length) { addLogEntry('error', '测试序列没有步骤'); alert('测试序列没有步骤'); return; }
            } else {
                items = itemRes.data || [];
                if (selectedIds.length > 0) {
                    items = items.filter(item => selectedIds.includes(item.id));
                    addLogEntry('info', `根据版本配置过滤后: ${items.length} 个测试项`);
                }
                if (!items.length) { addLogEntry('error', '没有可用的测试项'); alert('没有可用的测试项'); return; }
                addLogEntry('info', `获取到 ${items.length} 个测试项`);
            }
            const runBody = {
                serial_number: barcode,
                slot_id: parseInt(slotId),
                station_id: parseInt(stationId),
                operator: '操作员',
            };
            if (sequenceId) {
                const seqData = itemRes.data;
                runBody.sequence_id = sequenceId;
                runBody.sequence_name = seqData ? seqData.name : '';
            }
            fetch(`/api/tests/runs`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(runBody),
            }).then(r => r.json()).then(res => {
                if (res.code !== 0) { addLogEntry('error', '测试启动失败: ' + (res.message || '')); alert(res.message || '测试启动失败'); return; }
                const run = res.data;
                const batchId = run.batch_id;
                addLogEntry('info', `测试批次创建成功 - ID: ${run.id}, batch_id: ${batchId}`);
                if (slotId) {
                    fetch(`/api/stations/slots/${slotId}`, {
                        method:'PUT', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({status:'testing', current_batch_id: batchId})
                    });
                    addLogEntry('info', '槽位状态已更新为测试中');
                }
                bootstrap.Modal.getInstance(document.getElementById('barcodeModal')).hide();
                if (steps.length) {
                    executeTestItems(run.id, run.batch_id, items, slotId, stationId, 0, false, steps);
                } else {
                    executeTestItems(run.id, run.batch_id, items, slotId, stationId);
                }
            }).catch(() => { addLogEntry('error', '测试启动请求失败'); alert('请求失败'); });
        });
    });
}
function startRunWithSteps(steps, sequenceId, barcode, slotId, stationId) {
    const seqName = steps.length && steps[0].sequence_name ? steps[0].sequence_name : ('seq-' + sequenceId);
    const runBody = {
        serial_number: barcode,
        slot_id: parseInt(slotId),
        station_id: parseInt(stationId),
        operator: '操作员',
        sequence_id: parseInt(sequenceId),
        sequence_name: seqName,
    };
    fetch(`/api/tests/runs`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(runBody),
    }).then(r => r.json()).then(res => {
        if (res.code !== 0) { addLogEntry('error', '测试启动失败: ' + (res.message || '')); alert(res.message || '测试启动失败'); return; }
        const run = res.data;
        const batchId = run.batch_id;
        addLogEntry('info', `测试批次创建成功 - ID: ${run.id}, batch_id: ${batchId}`);
        if (slotId) {
            fetch(`/api/stations/slots/${slotId}`, {
                method:'PUT', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({status:'testing', current_batch_id: batchId})
            });
            addLogEntry('info', '槽位状态已更新为测试中');
        }
        bootstrap.Modal.getInstance(document.getElementById('barcodeModal')).hide();
        executeTestItems(run.id, run.batch_id, [], slotId, stationId, 0, false, steps);
    }).catch(() => { addLogEntry('error', '测试启动请求失败'); alert('请求失败'); });
}
function executeTestItems(runId, batchId, items, slotId, stationId, index, hasFailed, steps) {
    if (!index) index = 0;
    if (hasFailed === undefined) hasFailed = false;
    const total = steps ? steps.length : items.length;
    if (index >= total) {
        const finalPassed = !hasFailed;
        addLogEntry('info', `批次 ${batchId} 全部测试项执行完成，结果：${finalPassed ? '通过' : '失败'}`);
        const newStatus = finalPassed ? 'pass' : 'fail';
        fetch(`/api/stations/slots/${slotId}`, {
            method:'PUT', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({status: newStatus, current_batch_id: null})
        });
        fetch(`/api/tests/runs/${runId}`, {
            method: 'PUT', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: 'completed'})
        });
        const fillEl = document.getElementById('slot-fill-' + slotId);
        if (fillEl) {
            fillEl.style.background = finalPassed ? '#a3cfbb' : '#f1aeb5';
            fillEl.style.height = '100%';
        }
        const slotEl = document.getElementById('slot-' + slotId);
        if (slotEl) {
            const labelEl = slotEl.querySelector('.slot-content div:last-child');
            if (labelEl) labelEl.textContent = statusLabel(newStatus);
        }
        return;
    }
    if (steps) {
        // Sequence mode
        const step = steps[index];
        const itemName = step.template_name;
        const isCritical = step.template_is_critical;
        const serviceAddr = step.template_service_address;
        const timeoutMs = (step.timeout_seconds || 60) * 1000;
        addLogEntry('info', `步骤 ${index+1}/${total} - ${itemName}${isCritical ? ' [关键项]' : ''}${serviceAddr ? ' → ' + serviceAddr : ''}`);
        const runStep = (actual, passed) => {
            if (!passed) hasFailed = true;
            addLogEntry(passed ? 'info' : 'error', `测试项 ${index+1}/${total} - ${itemName}: ${actual} (${passed ? '通过' : '失败'})${!passed && isCritical ? ' [关键项失败，停止后续]' : ''}`);
            const fillEl = document.getElementById('slot-fill-' + slotId);
            if (fillEl) {
                const pct = Math.round((index + 1) / total * 100);
                fillEl.style.background = '#9eeaf9';
                fillEl.style.height = pct + '%';
            }
            const stop = !passed && isCritical;
            fetch(`/api/tests/runs/${runId}/results`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({test_item_id: step.template_id, actual_value: actual, is_critical: isCritical, passed: passed}),
            }).then(r => r.json()).then(res => {
                if (stop) {
                    addLogEntry('error', `关键项 ${itemName} 测试失败，批次终止`);
                    executeTestItems(runId, batchId, items, slotId, stationId, total, true, steps);
                } else {
                    setTimeout(() => executeTestItems(runId, batchId, items, slotId, stationId, index + 1, hasFailed, steps), 500);
                }
            });
        };
        if (serviceAddr) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            fetch(serviceAddr, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    serial_number: document.getElementById('barcode-input-modal')?.value || '',
                    template_id: step.template_id,
                    template_name: itemName,
                }),
                signal: controller.signal,
            }).then(r => {
                clearTimeout(timer);
                return r.ok ? r.json().catch(() => ({})) : {};
            }).then(data => {
                const actual = parseFloat(data.actual_value);
                if (!isNaN(actual)) {
                    // Backend will evaluate pass/fail based on archived params
                    runStep(isNaN(actual) ? 0 : actual, data.passed !== false);
                } else {
                    throw new Error('invalid response');
                }
            }).catch(err => {
                addLogEntry('warn', `微服务调用失败 (${serviceAddr}): ${err.message}，使用随机值替代`);
                const actual = Math.round((Math.random() * 5 + 3) * 100) / 100;
                const passed = Math.random() < 0.9;
                runStep(actual, passed);
            });
        } else {
            // No service address - use fallback random value
            const actual = Math.round((Math.random() * 5 + 3) * 100) / 100;
            const passed = Math.random() < 0.9;
            runStep(actual, passed);
        }
    } else {
        // Traditional mode
        const item = items[index];
        const baseValue = parseFloat(item.expected_value) || 0;
        const minVal = parseFloat(item.min_value) || (baseValue - 1);
        const maxVal = parseFloat(item.max_value) || (baseValue + 1);
        const range = maxVal - minVal;
        const inRange = Math.random() < 0.9;
        const actual = inRange
            ? minVal + Math.random() * range
            : (Math.random() < 0.5 ? minVal - Math.random() * 0.5 : maxVal + Math.random() * 0.5);
        const passed = !!inRange;
        if (!passed) hasFailed = true;
        addLogEntry(passed ? 'info' : 'error', `测试项 ${index+1}/${total} - ${item.name}: ${Math.round(actual * 100) / 100} (${passed ? '通过' : '失败'})`);
        const fillEl = document.getElementById('slot-fill-' + slotId);
        if (fillEl) {
            const pct = Math.round((index + 1) / total * 100);
            fillEl.style.background = '#9eeaf9';
            fillEl.style.height = pct + '%';
        }
        fetch(`/api/tests/runs/${runId}/results`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({test_item_id: item.id, actual_value: Math.round(actual * 100) / 100}),
        }).then(r => r.json()).then(() => {
            setTimeout(() => executeTestItems(runId, batchId, items, slotId, stationId, index + 1, hasFailed, steps), 500);
        });
    }
}

// ==================== 实时运行日志面板 ====================

let logFilter = 'all';
let logEntries = [];

function addLogEntry(level, msg) {
    const time = new Date().toLocaleTimeString();
    logEntries.push({ time, level, msg });
    renderLogs();
}

function renderLogs() {
    const body = document.getElementById('log-body');
    if (!body) return;
    if (!body.isConnected) return;
    const filtered = logFilter === 'all' ? logEntries : logEntries.filter(e => e.level === logFilter);
    const levelLabels = { debug:'调试', info:'提示', warn:'告警', error:'错误', fatal:'致命' };
    if (filtered.length === 0) {
        body.innerHTML = '<div class="log-entry"><span class="log-msg" style="color:#555;">暂无日志</span></div>';
        return;
    }
    body.innerHTML = filtered.map(e => {
        return `<div class="log-entry">
            <span class="log-time">${e.time}</span>
            <span class="log-level log-level-${e.level}">[${levelLabels[e.level]||e.level}]</span>
            <span class="log-msg">${e.msg}</span>
        </div>`;
    }).join('');
}

function filterLogs(level) {
    logFilter = level;
    document.querySelectorAll('#log-filter-bar .log-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.level === level));
    renderLogs();
}

function showLogPanel(show) {
    const panel = document.getElementById('log-panel');
    const btn = document.getElementById('log-show-btn');
    if (show) {
        panel.classList.remove('d-none');
        btn.classList.add('d-none');
        renderLogs();
    } else {
        panel.classList.add('d-none');
        btn.classList.remove('d-none');
    }
}

function toggleLogPanel() {
    const panel = document.getElementById('log-panel');
    const btn = document.getElementById('log-show-btn');
    const show = panel.classList.contains('d-none');
    panel.classList.toggle('d-none', !show);
    btn.classList.toggle('d-none', show);
    if (show) renderLogs();
}

function clearLogs() {
    if (!confirm('确定清空所有日志？')) return;
    logEntries = [];
    renderLogs();
}

function exportLogs() {
    const levelLabels = { debug:'调试', info:'提示', warn:'告警', error:'错误', fatal:'致命' };
    const lines = logEntries.map(e => `[${e.time}] [${levelLabels[e.level]||e.level}] ${e.msg}`).join('\n');
    const blob = new Blob([lines], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `test_log_${new Date().toISOString().slice(0,19).replace(/[:-]/g,'')}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
}

// 日志面板拖拽调整高度（手动后程序不再自动改变）
let logResizing = false;
let logStartY = 0, logStartH = 0;
document.addEventListener('mousedown', function(e) {
    const handle = e.target.closest('#log-resize-handle');
    if (!handle) return;
    logResizing = true;
    logStartY = e.clientY;
    logStartH = document.getElementById('log-panel').offsetHeight;
    document.body.style.cursor = 'ns-resize';
    e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
    if (!logResizing) return;
    const panel = document.getElementById('log-panel');
    const newH = Math.max(100, Math.min(window.innerHeight * 0.6, logStartH - (e.clientY - logStartY)));
    panel.style.height = newH + 'px';
});
document.addEventListener('mouseup', function() {
    if (logResizing) {
        logResizing = false;
        document.body.style.cursor = '';
    }
});

function forceRestartStation(stationId) {
    if (!confirm('确定强制重启该测试工站的所有槽位？')) return;
    addLogEntry('warn', '强制重启工站所有槽位...');
    fetch(`/api/stations/${stationId}/detail`).then(r=>r.json()).then(res=>{
        if (res.code !== 0) return;
        const promises = [];
        (res.data.cabinets||[]).forEach(cab => (cab.chassis||[]).forEach(ch => (ch.slots||[]).forEach(s => {
            promises.push(fetch(`/api/stations/slots/${s.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'idle', current_batch_id:null}) }));
        })));
        Promise.all(promises).then(()=>{ addLogEntry('info', '工站已强制重启完成'); if (currentStationId) selectEquipment(currentStationId); });
    });
}

function forceRestartCabinet(cabinetId) {
    if (!confirm('确定强制重启该机柜下的所有槽位？')) return;
    addLogEntry('warn', '强制重启机柜...');
    fetch(`/api/stations/${currentStationId}/detail`).then(r=>r.json()).then(res=>{
        if (res.code !== 0) return;
        const cab = (res.data.cabinets||[]).find(c=>c.id===cabinetId);
        if (!cab) return;
        const promises = [];
        (cab.chassis||[]).forEach(ch => (ch.slots||[]).forEach(s => {
            promises.push(fetch(`/api/stations/slots/${s.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'idle', current_batch_id:null}) }));
        }));
        Promise.all(promises).then(()=>{ addLogEntry('info', '机柜已强制重启完成'); if (currentStationId) selectEquipment(currentStationId); });
    });
}

function forceRestartChassis(chassisId) {
    if (!confirm('确定强制重启该机框下的所有槽位？')) return;
    addLogEntry('warn', '强制重启机框...');
    fetch(`/api/stations/${currentStationId}/detail`).then(r=>r.json()).then(res=>{
        if (res.code !== 0) return;
        let chassis = null;
        (res.data.cabinets||[]).forEach(cab => (cab.chassis||[]).forEach(ch => { if (ch.id===chassisId) chassis=ch; }));
        if (!chassis) return;
        const promises = (chassis.slots||[]).map(s =>
            fetch(`/api/stations/slots/${s.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'idle', current_batch_id:null}) })
        );
        Promise.all(promises).then(()=>{ addLogEntry('info', '机框已强制重启完成'); if (currentStationId) selectEquipment(currentStationId); });
    });
}

function toggleAllSlots(chassisId, enable) {

        (res.data.cabinets||[]).forEach(cab => (cab.chassis||[]).forEach(ch => { if (ch.id===chassisId) chassis=ch; }));
        if (!chassis) return;
        const promises = (chassis.slots||[]).map(s =>
            fetch(`/api/stations/slots/${s.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status: enable ? 'idle' : 'disabled'}) })

        Promise.all(promises).then(()=>{ addLogEntry('info', enable ? '已启用全部槽位' : '已禁用全部槽位'); if (currentStationId) selectEquipment(currentStationId); });
