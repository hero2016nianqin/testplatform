<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 测试平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .login-card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-card .subtitle {
            text-align: center;
            color: #6c757d;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .login-card .form-control {
            border-radius: 10px;
            padding: 12px 16px;
        }
        .login-card .btn {
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
        }
        .login-icon {
            text-align: center;
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 16px;
        }
        .alert {
            border-radius: 10px;
            display: none;
        }
        .role-info {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon">
            <i class="bi bi-gear-wide-connected"></i>
        </div>
        <h1>生产测试平台</h1>
        <p class="subtitle">请登录以继续</p>

        <div class="alert alert-danger" id="login-error" role="alert"></div>

        <form id="login-form">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username"
                           placeholder="请输入用户名" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password"
                           placeholder="请输入密码" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="login-btn">
                <i class="bi bi-box-arrow-in-right"></i> 登 录
            </button>
        </form>

        <div class="role-info mt-4">
            <small>默认账号：admin / admin123（工艺工程师）<br>operator / 123456（生产操作员）</small>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('login-error');
            errorDiv.style.display = 'none';

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 登录中...';

            fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value.trim(),
                    password: document.getElementById('password').value,
                }),
            })
            .then(r => r.json())
            .then(res => {
                if (res.code === 0) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = res.message;
                    errorDiv.style.display = 'block';
                }
            })
            .catch(err => {
                errorDiv.textContent = '网络错误，请重试';
                errorDiv.style.display = 'block';
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> 登 录';
            });
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('login-form').dispatchEvent(new Event('submit'));
        });
    </script>
</body>
</html>
